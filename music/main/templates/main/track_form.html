{% extends "base.html" %}

{% block title %}{{ title }}{% endblock title %}

{% block content %}
<h1>{{ title }}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'tracks' %}">Назад к трекам</a>
{% endblock content %}
